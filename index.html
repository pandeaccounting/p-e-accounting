<body>
<div id="root"></div>
<script>
const {createElement:h, useState, useRef, useCallback, useEffect, Fragment} = React;

// ── Supabase ──────────────────────────────────────────────────────────────────
const SB_URL = "https://exkkjdwcxwltm.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNjQxNzY5MjAwLCJleHAiOjE5OTk5OTk5OTl9.iUGqCbBRx6Hbe892rjnBCGxmadeFx2aRm-U_ne4FT-w";
const HD = {"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Accept":"application/json"};
const req = (path,opts={}) => fetch(SB_URL+"/rest/v1/"+path,{...opts,headers:{...HD,...(opts.headers||{})}});
const db = {
  get: async r => { try{const x=await req("transactions?room_code=eq."+r+"&order=created_at.asc"); return x.ok?x.json():[];}catch{return[];} },
  upsert: async rows => { const x=await req("transactions",{method:"POST",headers:{Prefer:"resolution=merge-duplicates,return=minimal"},body:JSON.stringify(Array.isArray(rows)?rows:[rows])}); if(!x.ok){const t=await x.text();throw new Error("DB "+x.status+": "+t);} },
  patch: async (id,f) => { try{await req("transactions?id=eq."+encodeURIComponent(id),{method:"PATCH",headers:{Prefer:"return=minimal"},body:JSON.stringify(f)});}catch(e){} },
  del: async id => { try{await req("transactions?id=eq."+encodeURIComponent(id),{method:"DELETE"});}catch(e){} },
};
const toDb = (t,room) => ({id:t.id,room_code:room,date:t.date,description:t.description,amount:t.amount,category:t.category,status:t.status,pato_share:t.patoShare,ai_cat:t.aiCat});
const fromDb = r => ({id:r.id,date:r.date||"",description:r.description||"",amount:parseFloat(r.amount)||0,category:r.category||"Other",status:r.status||"shared",patoShare:r.pato_share??50,aiCat:r.ai_cat??false});

// ── helpers ───────────────────────────────────────────────────────────────────
const CHF = n => new Intl.NumberFormat("fr-CH",{style:"currency",currency:"CHF"}).format(n??0);
const today = () => new Date().toISOString().slice(0,10);
const uid = () => Math.random().toString(36).slice(2)+Date.now().toString(36);
const genCode = () => { const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join(""); };

const CATS = ["Food","Groceries","Transport","Shopping","Home","Health","Entertainment","Subscriptions","Travel","Other"];
const CE = {Food:"🍽",Groceries:"🛒",Transport:"🚗",Shopping:"👗",Home:"🏠",Health:"💊",Entertainment:"🎭",Subscriptions:"📱",Travel:"✈️",Other:"•"};
const BLANK = {description:"",amount:"",date:today(),category:"Other",status:"shared",patoShare:50};

function guessCategory(d) {
  d=(d||"").toLowerCase();
  if(/migros|coop|lidl|aldi|spar|denner|volg/.test(d)) return "Groceries";
  if(/restaurant|cafe|café|pizz|burger|mcdonald|sushi|kebab|uber.?eat|takeaway|bar |bistro/.test(d)) return "Food";
  if(/cff|sbb|tpg|parking|fuel|esso|shell|taxi|uber|autoroute|toll/.test(d)) return "Transport";
  if(/netflix|spotify|apple|google|disney|swisscom|sunrise|salt /.test(d)) return "Subscriptions";
  if(/zara|h&m|zalando|asos|nike|adidas/.test(d)) return "Shopping";
  if(/amazon|digitec|galaxus|mediamarkt/.test(d)) return "Shopping";
  if(/pharmacy|pharmacie|apotheke|doctor|gym|fitness|decathlon/.test(d)) return "Health";
  if(/hotel|airbnb|booking|flight|easyjet|ryanair/.test(d)) return "Travel";
  if(/cinema|concert|theatre|museum/.test(d)) return "Entertainment";
  if(/ikea|hornbach|bauhaus/.test(d)) return "Home";
  return "Other";
}

function normDate(raw) {
  if(!raw) return "";
  const s=raw.trim();
  const m=s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{2,4})$/);
  if(m){const y=m[3].length===2?"20"+m[3]:m[3];return y+"-"+m[2].padStart(2,"0")+"-"+m[1].padStart(2,"0");}
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const d=new Date(s); return isNaN(d)?"":d.toISOString().slice(0,10);
}

function parseCSV(text) {
  const lines=text.trim().split("\n").filter(Boolean); if(lines.length<2) return [];
  const hi=lines[0].toLowerCase().split(/[,;|\t]/);
  return lines.slice(1).flatMap(line=>{
    const cols=line.split(/[,;|\t]/).map(c=>c.trim().replace(/^"|"$/g,""));
    if(cols.length<2) return [];
    const di=hi.findIndex(h=>h.includes("date")||h.includes("datum"));
    const ai=hi.findIndex(h=>h.includes("amount")||h.includes("betrag")||h.includes("montant")||h.includes("debit"));
    const xi=hi.findIndex(h=>h.includes("desc")||h.includes("merchant")||h.includes("text"));
    const amount=parseFloat((cols[ai>=0?ai:cols.length-1]||"0").replace(/[^0-9.\-]/g,""))||0;
    const desc=cols[xi>=0?xi:1]||"";
    if(!amount||!desc) return [];
    return [{date:normDate(cols[di>=0?di:0]||""),description:desc,amount:Math.abs(amount),category:guessCategory(desc)}];
  });
}

function toBase64(file) { return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);}); }

async function extractAI(file) {
  const isCSV=file.type==="text/csv"||file.name.endsWith(".csv")||file.name.endsWith(".txt");
  if(isCSV){const text=await file.text();return parseCSV(text);}
  const b64=await toBase64(file);
  const year=new Date().getFullYear();
  const prompt="Extract ALL transactions from this bank/credit card statement (Swiss format). Return ONLY a JSON array, no markdown. Each item: {\"date\":\"YYYY-MM-DD\",\"description\":\"merchant\",\"amount\":12.34,\"category\":\"Food|Groceries|Transport|Shopping|Home|Health|Entertainment|Subscriptions|Travel|Other\"}. Dates must be YYYY-MM-DD using year "+year+" if missing. Amounts always positive. Skip credits/refunds.";
  const content=file.type==="application/pdf"
    ?[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:prompt}]
    :[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:prompt}];
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:8000,messages:[{role:"user",content}]})});
  const data=await res.json();
  const raw=(data.content?.map(c=>c.text||"").join("")||"").replace(/```json|```/g,"").trim();
  const s=raw.indexOf("["),e=raw.lastIndexOf("]");
  if(s===-1) return [];
  return JSON.parse(raw.slice(s,e+1));
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [stage, setStage] = useState("room");
  const [roomCode, setRoomCode] = useState("");
  const [joinInput, setJoinInput] = useState("");
  const [txs, setTxs] = useState([]);
  const [fileName, setFileName] = useState("");
  const [gSplit, setGSplit] = useState(50);
  const [filter, setFilter] = useState("all");
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState(BLANK);
  const [editId, setEditId] = useState(null);
  const [catPick, setCatPick] = useState(null);
  const [flash, setFlash] = useState(null);
  const [error, setError] = useState("");
  const [drag, setDrag] = useState(false);
  const [sync, setSync] = useState(null);
  const lastWrite = useRef(0);
  const fileRef = useRef();
  const formRef = useRef();

  const toast = (msg,color="#a78b2f") => { setFlash({msg,color}); setTimeout(()=>setFlash(null),2000); };

  // poll
  useEffect(()=>{
    if(stage!=="review"||!roomCode) return;
    const poll=async()=>{
      if(Date.now()-lastWrite.current<2000) return;
      const rows=await db.get(roomCode);
      if(rows.length) setTxs(rows.map(fromDb));
    };
    poll();
    const id=setInterval(poll,3000);
    return()=>clearInterval(id);
  },[stage,roomCode]);

  const write = async fn => { lastWrite.current=Date.now(); setSync("syncing"); try{await fn(); setSync("synced"); setTimeout(()=>setSync(null),1500);}catch(e){setSync(null);toast(e.message,"#c0392b");} };

  const createRoom = () => { const code=genCode(); setRoomCode(code); setTxs([]); setFileName(""); setStage("upload"); };
  const joinRoom = async () => {
    const code=joinInput.trim().toUpperCase();
    if(code.length<4){setError("Enter a valid room code.");return;}
    setError("");
    const rows=await db.get(code);
    setRoomCode(code); setTxs(rows.map(fromDb)); setStage("review");
  };

  const enrich = raw => raw.map(t=>({id:uid(),date:t.date||"",description:t.description||"Unknown",amount:parseFloat(t.amount)||0,category:t.category||"Other",status:"shared",patoShare:gSplit,aiCat:true}));

  const processFile = async file => {
    setError(""); setFileName(file.name); setStage("loading");
    try {
      const raw=await extractAI(file);
      if(!raw||!raw.length) throw new Error("No transactions found — try CSV format.");
      const enriched=enrich(raw);
      lastWrite.current=Date.now(); setSync("syncing");
      await db.upsert(enriched.map(t=>toDb(t,roomCode)));
      setSync("synced"); setTimeout(()=>setSync(null),2000);
      setTxs(enriched); setStage("review");
    } catch(e) { setError(e.message||"Upload failed."); setStage("upload"); }
  };

  const handleFile = f => {
    if(!f) return;
    const ok=f.type.startsWith("image/")||["application/pdf","text/csv","text/plain"].includes(f.type)||f.name.match(/\.(pdf|csv|txt)$/i);
    if(!ok){setError("Please upload a PDF, CSV, TXT, or image.");return;}
    processFile(f);
  };

  const toggle = async id => { const next=txs.map(t=>t.id===id?{...t,status:t.status==="shared"?"personal":"shared"}:t); setTxs(next); const t=next.find(x=>x.id===id); await write(()=>db.patch(id,{status:t.status})); };
  const setShare = async (id,v) => { setTxs(ts=>ts.map(t=>t.id===id?{...t,patoShare:v}:t)); await write(()=>db.patch(id,{pato_share:v})); };
  const setCat = async (id,cat) => { setTxs(ts=>ts.map(t=>t.id===id?{...t,category:cat,aiCat:false}:t)); setCatPick(null); await write(()=>db.patch(id,{category:cat,ai_cat:false})); };
  const del = async id => { setTxs(ts=>ts.filter(t=>t.id!==id)); toast("Deleted","#c0392b"); await write(()=>db.del(id)); };
  const applyAll = async () => { const next=txs.map(t=>t.status==="shared"?{...t,patoShare:gSplit}:t); setTxs(next); await write(()=>db.upsert(next.map(t=>toDb(t,roomCode)))); };
